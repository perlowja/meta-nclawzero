# SPDX-License-Identifier: Apache-2.0
#
# Comprehensive Jetson Orin hardware coverage — Orin Nano / Orin Nano Super /
# Orin NX p3767 carrier. Every CONFIG_* below is paired with a firmware
# package in IMAGE_INSTALL ("no broken drivers" rule — see
# feedback_no_broken_drivers.md). Missing firmware is a gate failure.
#
# Thor (p3740 / p3834 carrier, T26x): add a thor-hw.cfg sibling once
# meta-tegra supports Thor machines. sm_100+ CUDA architectures + any
# new NIC/WiFi IDs will need their own entries.

# ============================================================================
# On-carrier PCIe devices (lspci on Orin Nano Super)
# ============================================================================

# --- Onboard NIC: Realtek RTL8168 (10ec:8168) ---
CONFIG_R8169=m
CONFIG_REALTEK_PHY=y
CONFIG_LIBPHY=y

# --- Onboard WiFi: Realtek RTL8822CE (10ec:c822) ---
# Combo WiFi+BT card; the BT half is attached via internal USB bus and
# needs CONFIG_BT_HCIBTUSB + CONFIG_BT_RTL + the rtl_bt firmware below.
CONFIG_CFG80211=m
CONFIG_MAC80211=m
CONFIG_RTW88=m
CONFIG_RTW88_CORE=m
CONFIG_RTW88_PCI=m
CONFIG_RTW88_8822C=m
CONFIG_RTW88_8822CE=m
# CONFIG_RTW88_DEBUG is not set
# CONFIG_RTW88_DEBUGFS is not set

# --- Onboard Bluetooth: RTL8822CE BT half ---
CONFIG_BT=m
CONFIG_BT_BREDR=y
CONFIG_BT_LE=y
CONFIG_BT_HCIUART=m
CONFIG_BT_HCIUART_H4=y
CONFIG_BT_HCIUART_BCSP=y
CONFIG_BT_HCIUART_LL=y
CONFIG_BT_HCIBTUSB=m
CONFIG_BT_HCIBTUSB_BCM=y
CONFIG_BT_RTL=m
CONFIG_BT_HCIBTSDIO=m

# --- NVMe: generic; works for any M.2 Key-M SSD (ours Sabrent 15b7:5045) ---
CONFIG_BLK_DEV_NVME=y
CONFIG_NVME_CORE=y

# ============================================================================
# Audio — HDMI + USB paths (future audio-model work)
# ============================================================================
CONFIG_SOUND=m
CONFIG_SND=m
CONFIG_SND_PCM=m
CONFIG_SND_HDA_TEGRA=m
CONFIG_SND_HDA_CODEC_HDMI=m
CONFIG_SND_HDA_HWDEP=m
CONFIG_SND_HDA_RECONFIG=y
CONFIG_SND_USB_AUDIO=m
CONFIG_SND_SOC=m
CONFIG_SND_SOC_TEGRA=m
CONFIG_SND_SOC_TEGRA210_AHUB=m
CONFIG_SND_SOC_TEGRA210_ADMAIF=m
CONFIG_SND_SOC_TEGRA210_I2S=m

# The base L4T DTB references nvidia,tegra186-audio-graph-card with 180+
# phantom DAI-links; no onboard codec on devkit → -16 EBUSY at probe.
# "no broken drivers" rule: disable the driver at kconfig level. HDA +
# USB audio paths above still work; re-enable these if a codec HAT ships
# with a corrected DT overlay.
# CONFIG_SND_SOC_TEGRA_AUDIO_GRAPH_CARD is not set
# CONFIG_SND_SOC_AUDIO_GRAPH_CARD is not set
# CONFIG_SND_SOC_SIMPLE_CARD is not set

# ============================================================================
# USB serial — dev-board bring-up (FTDI / CP210x / CH341 / PL2303 / WCH)
# Essential for: TTY access to peripheral MCUs, sensor dev-kits, debug UARTs
# ============================================================================
CONFIG_USB_SERIAL=m
CONFIG_USB_SERIAL_FTDI_SIO=m
CONFIG_USB_SERIAL_CP210X=m
CONFIG_USB_SERIAL_CH341=m
CONFIG_USB_SERIAL_PL2303=m
CONFIG_USB_SERIAL_WCH=m
CONFIG_USB_SERIAL_QCAUX=m
CONFIG_USB_ACM=m

# ============================================================================
# 40-pin header I/O (Raspberry-Pi-compatible pinout on p3767 carrier)
# GPIO / I2C / SPI char-dev for user-space peripheral attachment
# ============================================================================
CONFIG_GPIO_SYSFS=y
CONFIG_GPIO_CDEV=y
CONFIG_I2C_CHARDEV=m
CONFIG_SPI_SPIDEV=m
CONFIG_PWM_SYSFS=y

# --- Common sensor-bus chips found on HATs / carrier daughterboards ---
# EEPROM chips (Atmel 24Cxx)
CONFIG_EEPROM_AT24=m
# ADCs (MCP3008, ADS1015/1115 — very common on sensor HATs)
CONFIG_MCP320X=m
CONFIG_TI_ADS1015=m
# RTCs (DS1307 / DS3231 — most RTC HATs)
CONFIG_RTC_DRV_DS1307=m
CONFIG_RTC_DRV_DS3231=m
# Temp/humidity sensors typical on IoT HATs
CONFIG_SENSORS_BME280=m
CONFIG_SENSORS_SHT3x=m
CONFIG_SENSORS_HTS221=m

# ============================================================================
# CAN bus — Jetson exposes CAN on the 40-pin header (tegra-can) + MCP2515 HATs
# ============================================================================
CONFIG_CAN=m
CONFIG_CAN_RAW=m
CONFIG_CAN_BCM=m
CONFIG_CAN_MCP251X=m

# ============================================================================
# USB Ethernet adapters (development + field-rescue hot-spare)
# Plugable USB NIC currently used on TYDEUS ships rtl8156b-2.fw via r8152.
# ============================================================================
CONFIG_USB_NET_DRIVERS=y
CONFIG_USB_USBNET=m
CONFIG_USB_NET_CDC_NCM=m
CONFIG_USB_RTL8152=m
CONFIG_USB_RTL8153_ECM=m
CONFIG_USB_NET_AX88179_178A=m
CONFIG_USB_NET_CDC_EEM=m
CONFIG_USB_NET_CDCETHER=m

# ============================================================================
# Cgroups + namespaces + overlay — Docker runtime + per-skill isolation
# ============================================================================
CONFIG_CGROUPS=y
CONFIG_MEMCG=y
CONFIG_CGROUP_SCHED=y
CONFIG_CGROUP_PIDS=y
CONFIG_CGROUP_FREEZER=y
CONFIG_CGROUP_DEVICE=y
CONFIG_CPUSETS=y
CONFIG_CGROUP_CPUACCT=y
CONFIG_NAMESPACES=y
CONFIG_UTS_NS=y
CONFIG_IPC_NS=y
CONFIG_USER_NS=y
CONFIG_PID_NS=y
CONFIG_NET_NS=y
CONFIG_OVERLAY_FS=y

# --- Container networking ---
CONFIG_BRIDGE=y
CONFIG_VETH=y
CONFIG_BRIDGE_NETFILTER=y
CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
CONFIG_IP_NF_NAT=y
CONFIG_IP_NF_TARGET_MASQUERADE=y
CONFIG_NF_NAT=y
CONFIG_POSIX_MQUEUE=y
CONFIG_IPVLAN=m
CONFIG_MACVLAN=m

# ============================================================================
# Security — Landlock LSM (per NemoClaw sandbox spec) + Seccomp
# ============================================================================
CONFIG_SECURITY=y
CONFIG_SECURITY_LANDLOCK=y
CONFIG_LSM="landlock,lockdown,yama,integrity,apparmor,bpf"
CONFIG_SECCOMP=y
CONFIG_SECCOMP_FILTER=y

# ============================================================================
# Misc — useful-always
# ============================================================================
CONFIG_WATCHDOG=y
CONFIG_WATCHDOG_CORE=y
CONFIG_FUSE_FS=m
CONFIG_CUSE=m
CONFIG_TUN=m
CONFIG_PPP=m
CONFIG_PPP_ASYNC=m

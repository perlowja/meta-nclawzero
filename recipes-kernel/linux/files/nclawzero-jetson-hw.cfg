# Kernel config fragment for nclawzero — Jetson Orin Nano / Thor / Super:
#   - RTL8168 onboard gigabit ethernet (PCIe 10ec:8168)
#   - RTL8822CE onboard WiFi (PCIe 10ec:c822)
#   - HDMI / HDA audio + USB audio (for future audio-model support)
#   - Cgroups + namespaces + Landlock (Docker + NemoClaw sandbox baseline,
#     mirrors what recipes-kernel/linux/files/nclawzero.cfg provides on Pi)

# --- Onboard NIC: Realtek RTL8168 ---
CONFIG_R8169=m
CONFIG_REALTEK_PHY=y

# --- Onboard WiFi: Realtek RTL8822CE ---
CONFIG_RTW88=m
CONFIG_RTW88_CORE=m
CONFIG_RTW88_PCI=m
CONFIG_RTW88_8822C=m
CONFIG_RTW88_8822CE=m
# CONFIG_RTW88_DEBUG is not set
# CONFIG_RTW88_DEBUGFS is not set
CONFIG_CFG80211=m
CONFIG_MAC80211=m

# --- Audio: HDMI, HDA, USB (future audio-model support) ---
CONFIG_SOUND=m
CONFIG_SND=m
CONFIG_SND_PCM=m
CONFIG_SND_HDA_TEGRA=m
CONFIG_SND_HDA_CODEC_HDMI=m
CONFIG_SND_HDA_HWDEP=m
CONFIG_SND_HDA_RECONFIG=y
CONFIG_SND_USB_AUDIO=m
CONFIG_SND_SOC=m
CONFIG_SND_SOC_TEGRA=m
CONFIG_SND_SOC_TEGRA210_AHUB=m
CONFIG_SND_SOC_TEGRA210_ADMAIF=m
CONFIG_SND_SOC_TEGRA210_I2S=m

# --- Cgroups (Docker baseline) ---
CONFIG_CGROUPS=y
CONFIG_MEMCG=y
CONFIG_CGROUP_SCHED=y
CONFIG_CGROUP_PIDS=y
CONFIG_CGROUP_FREEZER=y
CONFIG_CGROUP_DEVICE=y
CONFIG_CPUSETS=y
CONFIG_CGROUP_CPUACCT=y

# --- Namespaces (required by Docker) ---
CONFIG_NAMESPACES=y
CONFIG_UTS_NS=y
CONFIG_IPC_NS=y
CONFIG_USER_NS=y
CONFIG_PID_NS=y
CONFIG_NET_NS=y

# --- Overlay filesystem (Docker default storage driver) ---
CONFIG_OVERLAY_FS=y

# --- Container networking (Docker bridge + NAT) ---
CONFIG_BRIDGE=y
CONFIG_VETH=y
CONFIG_BRIDGE_NETFILTER=y
CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
CONFIG_IP_NF_NAT=y
CONFIG_IP_NF_TARGET_MASQUERADE=y
CONFIG_NF_NAT=y
CONFIG_POSIX_MQUEUE=y
CONFIG_IPVLAN=m
CONFIG_MACVLAN=m

# --- Landlock LSM (per NemoClaw sandbox-hardening spec) ---
CONFIG_SECURITY=y
CONFIG_SECURITY_LANDLOCK=y
CONFIG_LSM="landlock,lockdown,yama,integrity,apparmor,bpf"

# --- Seccomp (Docker cap-drop runtime hardening) ---
CONFIG_SECCOMP=y
CONFIG_SECCOMP_FILTER=y

# --- Disable broken graph-card driver ------------------------------------
# The base L4T DTB references nvidia,tegra186-audio-graph-card with 180+
# phantom DAI-links; no on-board codec exists on Orin Nano devkit → -16
# EBUSY at probe. We prefer not to ship a driver whose probe fails every
# boot (see feedback_no_broken_drivers.md rule). Future work: either ship
# a DT overlay that trims the graph to real endpoints, or (once a user
# attaches a codec HAT) re-enable these. Until then, HDMI HDA + USB audio
# above are the supported paths.
# CONFIG_SND_SOC_TEGRA_AUDIO_GRAPH_CARD is not set
# CONFIG_SND_SOC_AUDIO_GRAPH_CARD is not set
# CONFIG_SND_SOC_SIMPLE_CARD is not set

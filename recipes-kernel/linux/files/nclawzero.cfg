# SPDX-License-Identifier: Apache-2.0
# Kernel config fragment for nclawzero — enables Docker runtime and
# NemoClaw sandbox (Landlock LSM) requirements on the Raspberry Pi kernel.

# --- Cgroups (Docker baseline) ---
CONFIG_CGROUPS=y
CONFIG_MEMCG=y
CONFIG_CGROUP_SCHED=y
CONFIG_CGROUP_PIDS=y
CONFIG_CGROUP_FREEZER=y
CONFIG_CGROUP_DEVICE=y
CONFIG_CPUSETS=y
CONFIG_CGROUP_CPUACCT=y

# --- Namespaces (required by Docker) ---
CONFIG_NAMESPACES=y
CONFIG_UTS_NS=y
CONFIG_IPC_NS=y
CONFIG_USER_NS=y
CONFIG_PID_NS=y
CONFIG_NET_NS=y

# --- Overlay filesystem (Docker default storage driver) ---
CONFIG_OVERLAY_FS=y

# --- Container networking (Docker bridge + NAT) ---
CONFIG_BRIDGE=y
CONFIG_VETH=y
CONFIG_BRIDGE_NETFILTER=y
CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
CONFIG_NETFILTER_XT_MATCH_IPVS=y
CONFIG_IP_NF_NAT=y
CONFIG_IP_NF_TARGET_MASQUERADE=y
CONFIG_NF_NAT=y
CONFIG_POSIX_MQUEUE=y
CONFIG_IPVLAN=m
CONFIG_MACVLAN=m

# --- Landlock LSM (per NemoClaw sandbox-hardening spec) ---
CONFIG_SECURITY=y
CONFIG_SECURITY_LANDLOCK=y
CONFIG_LSM="landlock,lockdown,yama,integrity,apparmor,bpf"

# --- Seccomp (Docker cap-drop runtime hardening) ---
CONFIG_SECCOMP=y
CONFIG_SECCOMP_FILTER=y

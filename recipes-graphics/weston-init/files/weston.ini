# nclawzero Weston config — RDP remote desktop
#
# Listens on :3389, TLS-encrypted, uses self-signed cert generated at
# first boot by nclawzero-rdp-init.service. Connect with Windows App /
# Microsoft Remote Desktop client.

[core]
backend=rdp-backend.so
shell=desktop-shell.so
idle-time=0
require-input=false

[shell]
locking=false
panel-position=bottom
startup-animation=fade

[rdp]
refresh-rate=60
tls-cert=/etc/weston/tls.cert
tls-key=/etc/weston/tls.key

[libinput]
enable-tap=true

[output]
name=RDP-1
mode=1920x1080

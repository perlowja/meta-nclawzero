#
# meta-nclawzero — Yocto layer for ZeroClaw + NemoClaw edge agent images
#
# Pulls upstream NemoClaw and ZeroClaw at build time, applies patches,
# layers overlays, produces flashable images for Raspberry Pi and Jetson.

BBPATH .= ":${LAYERDIR}"

BBFILES += " \
    ${LAYERDIR}/recipes-*/*/*.bb \
    ${LAYERDIR}/recipes-*/*/*/*.bb \
    ${LAYERDIR}/recipes-*/*/*.bbappend \
    ${LAYERDIR}/recipes-*/*/*/*.bbappend \
"

BBFILE_COLLECTIONS += "nclawzero"
BBFILE_PATTERN_nclawzero = "^${LAYERDIR}/"
BBFILE_PRIORITY_nclawzero = "10"

LAYERDEPENDS_nclawzero = " \
    core \
    meta-python \
    openembedded-layer \
"

LAYERSERIES_COMPAT_nclawzero = "scarthgap"

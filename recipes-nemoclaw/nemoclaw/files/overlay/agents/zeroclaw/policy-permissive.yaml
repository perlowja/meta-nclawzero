# Permissive sandbox policy for ZeroClaw.
# Used when --dangerously-skip-permissions is set.
# All network endpoints use access: full (no L7 filtering).
# Mirrors agents/hermes/policy-permissive.yaml structure.

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
    - /sandbox/.zeroclaw
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
    - /sandbox/.zeroclaw-data

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  claude_code:
    name: claude_code
    endpoints:
      - host: api.anthropic.com
        port: 443
        access: full
      - host: statsig.anthropic.com
        port: 443
        access: full
      - host: sentry.io
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/claude }

  nvidia:
    name: nvidia
    endpoints:
      - host: integrate.api.nvidia.com
        port: 443
        access: full
      - host: inference-api.nvidia.com
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/local/bin/zeroclaw }

  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        access: full
      - host: api.github.com
        port: 443
        access: full
    binaries:
      - { path: /usr/bin/gh }
      - { path: /usr/bin/git }

  zeroclaw_labs:
    name: zeroclaw_labs
    endpoints:
      - host: zeroclaw-labs.com
        port: 443
        access: full
      - host: api.zeroclaw-labs.com
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/zeroclaw }

  messaging:
    name: messaging
    endpoints:
      - host: api.telegram.org
        port: 443
        access: full
      - host: discord.com
        port: 443
        access: full
      - host: gateway.discord.gg
        port: 443
        access: full
      - host: slack.com
        port: 443
        access: full
      - host: wss-primary.slack.com
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/zeroclaw }
